<!DOCTYPE html>


<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>英文單字卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />


<style>
  :root {
    --bg:        #e8edf2;
    --surface:   #f2f5f8;
    --card:      #ffffff;
    --primary:   #6e8fa8;
    --primary-d: #4d7090;
    --accent:    #a8bfcc;
    --muted:     #8fa3b0;
    --border:    #c9d8e2;
    --text:      #2c3e4a;
    --text-2:    #5a7080;
    --text-3:    #8fa3b0;
    --star:      #c0a882;
    --tag-bg:    #dce8ef;
    --shadow:    0 4px 24px rgba(110,143,168,.13);
    --shadow-lg: 0 12px 40px rgba(80,120,150,.18);
    --radius:    16px;
    --radius-sm: 10px;
  }


  * { box-sizing: border-box; margin: 0; padding: 0; }


  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }


  /* ── Password Screen ── */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }


  .lock-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    padding: 52px 48px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }


  .lock-icon {
    font-size: 2.2rem;
    margin-bottom: -4px;
  }


  .lock-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    color: var(--primary-d);
    font-style: italic;
    letter-spacing: .03em;
  }


  .lock-sub {
    font-size: .85rem;
    color: var(--text-3);
    line-height: 1.6;
    margin-top: -8px;
  }


  .lock-input {
    width: 100%;
    padding: 13px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    text-align: center;
    letter-spacing: .12em;
    transition: border-color .2s, box-shadow .2s;
  }
  .lock-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(110,143,168,.15);
  }
  .lock-input.error {
    border-color: #c0726a;
    animation: shake .3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0) }
    25%      { transform: translateX(-6px) }
    75%      { transform: translateX(6px) }
  }


  .lock-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: .06em;
    transition: background .2s, transform .15s;
  }
  .lock-btn:hover { background: var(--primary-d); transform: translateY(-1px); }
  .lock-btn:active { transform: translateY(0); }


  .lock-error {
    font-size: .82rem;
    color: #b05a54;
    min-height: 18px;
    transition: opacity .2s;
  }


  .lock-hide { display: none !important; }


  /* ── Header ── */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }


  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    color: var(--primary-d);
    letter-spacing: .04em;
    font-style: italic;
    flex-shrink: 0;
  }


  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
  }


  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .82rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f5f9; }
  .btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }


  .btn-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all .2s;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--primary); color: var(--primary); }


  /* ── Main ── */
  main {
    width: 100%;
    max-width: 760px;
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }


  /* ── Progress & Nav ── */
  .progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 4px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }


  .counter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: .06em;
    align-self: flex-end;
  }


  /* ── Jump bar ── */
  .jump-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .jump-bar input {
    width: 80px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .85rem;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .jump-bar input:focus { border-color: var(--primary); }
  .jump-bar span { font-size: .82rem; color: var(--text-3); }


  /* ── Card ── */
  .card-wrapper {
    width: 100%;
    perspective: 1200px;
  }


  .card {
    width: 100%;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 40px 44px 36px;
    position: relative;
    border: 1px solid var(--border);
    animation: cardIn .35s cubic-bezier(.4,0,.2,1);
  }


  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px) scale(.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }


  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
  }


  .word-main {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--text);
    line-height: 1;
    letter-spacing: .01em;
  }


  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    color: var(--border);
    transition: color .2s, transform .2s;
    padding: 4px;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .star-btn.starred { color: var(--star); transform: scale(1.1); }
  .star-btn:hover { transform: scale(1.15); }


  .pos-tag {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--primary);
    background: var(--tag-bg);
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: .04em;
  }


  .chinese {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.6;
  }


  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }


  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: .82rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 8px;
  }


  .example-text {
    font-size: .95rem;
    color: var(--text-2);
    line-height: 1.75;
    font-style: italic;
    margin-bottom: 0;
  }


  .writing-note {
    font-size: .88rem;
    color: var(--text-2);
    line-height: 1.7;
    background: var(--tag-bg);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--primary);
  }


  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }


  .tag {
    font-size: .78rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--text-2);
    border: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: .02em;
  }
  .tag.syn { color: #5a8a6a; background: #e4efe8; border-color: #c0dcc8; }
  .tag.ant { color: #8a5a5a; background: #f0e4e4; border-color: #dcc0c0; }


  .no-tag { font-size: .8rem; color: var(--text-3); font-style: italic; }


  /* ── Nav buttons ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    margin-top: 4px;
  }


  .nav-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    box-shadow: var(--shadow);
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: #eef3f7; transform: scale(1.06); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }


  /* ── Starred panel ── */
  .starred-info {
    font-size: .82rem;
    color: var(--muted);
  }


  /* ── No data ── */
  .empty {
    text-align: center;
    color: var(--text-3);
    font-style: italic;
    padding: 60px 20px;
  }


  /* ── Responsive ── */
  @media (max-width: 540px) {
    header { padding: 14px 16px; }
    .card { padding: 28px 22px 24px; }
    .word-main { font-size: 2rem; }
    .site-title { font-size: 1.1rem; }
  }
</style>


</head>
<body>


<!-- ══ 密碼鎖定頁 ══ -->


<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔑</div>
    <div class="lock-title">Word Cards</div>
    <p class="lock-sub">請輸入密碼以繼續</p>
    <input class="lock-input" id="pwInput" type="password" placeholder="password" autocomplete="off" />
    <div class="lock-error" id="pwError"></div>
    <button class="lock-btn" onclick="checkPassword()">進入</button>
  </div>
</div>


<header>
  <div class="site-title">Word Cards</div>
  <div class="header-controls">
    <div class="jump-bar">
      <input type="number" id="jumpInput" placeholder="跳轉" min="1" />
      <span id="jumpHint"></span>
      <button class="btn" onclick="doJump()">Go</button>
    </div>
    <button class="btn" id="shuffleBtn" onclick="toggleShuffle()">🔀 隨機</button>
    <button class="btn" id="starFilterBtn" onclick="toggleStarFilter()">⭐ 已標記</button>
  </div>
</header>


<main>
  <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
    <div class="starred-info" id="starredInfo"></div>
    <div class="counter" id="counter"></div>
  </div>


  <div class="progress-bar-wrap" style="width:100%">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>


  <div class="card-wrapper" id="cardWrapper">
    <div class="empty">請先加入 JSON 資料或等待載入…</div>
  </div>


  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" title="上一張">←</button>
    <button class="nav-btn" onclick="navigate(1)" style="background:var(--primary);border-color:var(--primary);color:#fff;" title="下一張">→</button>
  </div>
</main>


<script>
// ── 密碼保護 ──────────────────────────────────────────────
// ★ 想改密碼：把下面 CORRECT_PASSWORD 的值換掉就好
const CORRECT_PASSWORD = 'english2024';
const SESSION_KEY = 'en_card_auth';


function checkPassword() {
  const val = document.getElementById('pwInput').value.trim();
  const errEl = document.getElementById('pwError');
  const input = document.getElementById('pwInput');


  if (val === CORRECT_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    const lock = document.getElementById('lockScreen');
    lock.style.opacity = '0';
    lock.style.transition = 'opacity .35s';
    setTimeout(() => lock.classList.add('lock-hide'), 360);
  } else {
    errEl.textContent = '密碼錯誤，請再試一次 🙅';
    input.classList.add('error');
    input.value = '';
    setTimeout(() => {
      input.classList.remove('error');
      errEl.textContent = '';
    }, 1800);
  }
}


// Enter 鍵送出
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});


// 同一 session 內不需重輸
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('lockScreen').classList.add('lock-hide');
}

// ── 狀態 ──────────────────────────────────────────────────
let allData       = [...RAW_DATA];
let displayList   = [...allData];   // 當前顯示序列（可能是打亂後的）
let idx           = 0;
let starred       = new Set(JSON.parse(localStorage.getItem('en_starred') || '[]'));
let isShuffled    = false;
let starFilterOn  = false;


// ── 初始化 ────────────────────────────────────────────────
function init() {
  displayList = [...allData];
  idx = 0;
  updateJumpHint();
  renderCard();
}


// ── 渲染 ──────────────────────────────────────────────────
function renderCard() {
  const wrapper = document.getElementById('cardWrapper');
  const list = getActiveList();


  if (!list.length) {
    wrapper.innerHTML = `<div class="empty">沒有${starFilterOn ? '已標記的' : ''}單字～</div>`;
    document.getElementById('counter').textContent = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('starredInfo').textContent = '';
    return;
  }


  const safeIdx = Math.min(Math.max(idx, 0), list.length - 1);
  idx = safeIdx;
  const item = list[safeIdx];
  const isStarred = starred.has(item.id);


  // Tags
  const synTags = item.synonyms?.length
    ? item.synonyms.map(s => `<span class="tag syn">${s}</span>`).join('')
    : `<span class="no-tag">—</span>`;


  const antTags = item.antonyms?.length
    ? item.antonyms.map(a => `<span class="tag ant">${a}</span>`).join('')
    : `<span class="no-tag">—</span>`;


  wrapper.innerHTML = `
    <div class="card">
      <div class="card-top">
        <div class="word-main">${item.word}</div>
        <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar(${item.id})" title="標記">★</button>
      </div>
      <div class="pos-tag">${item.pos}</div>
      <div class="chinese">${item.chinese}</div>


      <div class="divider"></div>


      <div class="section-label">Example</div>
      <p class="example-text">${item.example}</p>


      ${item.writing_note ? `
        <div class="divider"></div>
        <div class="section-label">Writing Note</div>
        <div class="writing-note">${item.writing_note}</div>
      ` : ''}


      <div class="divider"></div>


      <div style="display:flex; gap:24px; flex-wrap:wrap;">
        <div style="flex:1; min-width:140px;">
          <div class="section-label" style="margin-bottom:8px">Synonyms</div>
          <div class="tags-row">${synTags}</div>
        </div>
        <div style="flex:1; min-width:140px;">
          <div class="section-label" style="margin-bottom:8px">Antonyms</div>
          <div class="tags-row">${antTags}</div>
        </div>
      </div>
    </div>
  `;


  // Counter
  document.getElementById('counter').textContent = `${safeIdx + 1} / ${list.length}`;


  // Progress
  document.getElementById('progressBar').style.width = `${((safeIdx + 1) / list.length) * 100}%`;


  // Starred info
  document.getElementById('starredInfo').textContent =
    `已標記 ${starred.size} 個單字`;


  // Prev btn
  document.getElementById('prevBtn').disabled = safeIdx === 0;


  updateJumpHint();
}


// ── 取得當前清單 ──────────────────────────────────────────
function getActiveList() {
  if (starFilterOn) {
    return displayList.filter(w => starred.has(w.id));
  }
  return displayList;
}


// ── 導航 ──────────────────────────────────────────────────
function navigate(dir) {
  const list = getActiveList();
  idx = Math.min(Math.max(idx + dir, 0), list.length - 1);
  renderCard();
}


// ── 跳轉 ──────────────────────────────────────────────────
function doJump() {
  const v = parseInt(document.getElementById('jumpInput').value);
  const list = getActiveList();
  if (!isNaN(v) && v >= 1 && v <= list.length) {
    idx = v - 1;
    renderCard();
  }
  document.getElementById('jumpInput').value = '';
}


function updateJumpHint() {
  const list = getActiveList();
  document.getElementById('jumpHint').textContent = `/ ${list.length}`;
}


// ── 星號 ──────────────────────────────────────────────────
function toggleStar(id) {
  if (starred.has(id)) starred.delete(id);
  else starred.add(id);
  localStorage.setItem('en_starred', JSON.stringify([...starred]));
  renderCard();
}


// ── 隨機 ──────────────────────────────────────────────────
function toggleShuffle() {
  isShuffled = !isShuffled;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffled);
  if (isShuffled) {
    displayList = [...allData].sort(() => Math.random() - .5);
  } else {
    displayList = [...allData];
  }
  idx = 0;
  renderCard();
}


// ── 只顯示已標記 ──────────────────────────────────────────
function toggleStarFilter() {
  starFilterOn = !starFilterOn;
  document.getElementById('starFilterBtn').classList.toggle('active', starFilterOn);
  idx = 0;
  renderCard();
}


// ── 鍵盤 ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === 's' || e.key === 'S') {
    const list = getActiveList();
    const item = list[idx];
    if (item) toggleStar(item.id);
  }
});


// ── Enter 跳轉 ────────────────────────────────────────────
document.getElementById('jumpInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doJump();
});


// ── 啟動 ──────────────────────────────────────────────────
init();
</script>


</body>
